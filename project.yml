name: Tankapp

options:
  bundleIdPrefix: de.kilianvolz
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: de
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

configs:
  Debug: debug
  Release: release

targets:
  Tankapp:
    type: application
    platform: iOS
    sources:
      - path: Tankapp
        excludes:
          - "Info.plist"
    resources:
      - Tankapp/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.kilianvolz.tankapp
        PRODUCT_NAME: Tankapp
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Tankapp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          xcconfig: Secrets.xcconfig
        Release:
          xcconfig: Secrets.xcconfig

  TankappTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TankappTests
        excludes:
          - "Fixtures/**"
      - path: TankappTests/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Tankapp
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Tankapp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tankapp
        CODE_SIGN_STYLE: Automatic
